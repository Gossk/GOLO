spring.application.name=golo-backend

# Server
server.port=8080

# ---- MySQL Database ----
spring.datasource.url=jdbc:mysql://localhost:3306/golo_ecommerce?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Lima
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ---- JWT ----
golo.app.jwtSecret=GoloEcommerceSecretKeyMustBeAtLeast256BitsLongForHS512Algorithm2024!
golo.app.jwtExpirationMs=86400000

# ---- File Upload ----
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---- Jackson ----
spring.jackson.serialization.fail-on-empty-beans=false